{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="icon">🌾</span>
      <h2>Welcome Back</h2>
      <p>Login to your KisanMitra account</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Mobile Number</label>
        <input type="tel" name="phone" placeholder="10-digit mobile number" required autocomplete="tel"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;padding:13px">Login</button>
    </form>
    <p style="text-align:center;margin-top:22px;font-size:14px;color:var(--gray-400)">
      Don't have an account? <a href="{{ url_for('auth.register') }}" style="color:var(--green-mid);font-weight:600">Register Free</a>
    </p>
    <hr class="divider"/>
    <p style="font-size:12px;color:var(--gray-400);text-align:center">Demo: phone <strong>9876543210</strong> / password <strong>demo1234</strong></p>
  </div>
</div>
{% endblock %}
